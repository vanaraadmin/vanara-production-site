<div id="launcher">

    <!-- Large launcher, visible for 7 seconds on desktop -->

    <button
      id="introLauncher"
      type="button"
      aria-label="Chat with Waraporn"
    >
      <span class="intro-avatar">
        <img
          src="https://static.wixstatic.com/media/c090c7_a052ecc46c4543c986cb1cd85e856a99~mv2.jpg"
          alt=""
        />

        <span class="intro-status" aria-hidden="true"></span>
      </span>

      <span>
        <span class="intro-eyebrow">Your Local Host</span>

        <strong class="intro-name">Waraporn</strong>

        <span class="intro-copy">
          Ask me about Koh Chang or your stay.
        </span>

        <span class="intro-action">
          Chat with me

          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 12h14"></path>
            <path d="m13 6 6 6-6 6"></path>
          </svg>
        </span>
      </span>
    </button>

    <!-- Compact online launcher -->

    <button
      id="compactLauncher"
      type="button"
      aria-label="Open chat with Waraporn"
    >
      <span class="compact-avatar">
        <img
          src="https://static.wixstatic.com/media/c090c7_a052ecc46c4543c986cb1cd85e856a99~mv2.jpg"
          alt=""
        />
      </span>

      <span class="compact-copy">
        <strong class="compact-name">Waraporn</strong>

        <span class="compact-status">
          <span class="status-dot" aria-hidden="true"></span>
          Online now
        </span>
      </span>

      <svg
        class="compact-arrow"
        viewBox="0 0 24 24"
        aria-hidden="true"
      >
        <path d="M5 12h14"></path>
        <path d="m13 6 6 6-6 6"></path>
      </svg>
    </button>

    <!-- Offline launcher, deliberately not clickable -->

    <div
      id="offlineLauncher"
      role="status"
      aria-label="Waraporn is currently unavailable"
    >
      <span class="offline-avatar">
        <img
          src="https://static.wixstatic.com/media/c090c7_a052ecc46c4543c986cb1cd85e856a99~mv2.jpg"
          alt=""
        />

        <span class="offline-dot" aria-hidden="true"></span>
      </span>

      <span>
        <strong class="offline-name">Waraporn</strong>

        <span class="offline-text">
          Available daily 08:00–20:00<br />
          Bangkok time
        </span>
      </span>
    </div>

  </div>

  <!-- =======================================================
       CHAT WINDOW
       ======================================================= -->

  <section
    id="chatWindow"
    aria-label="Chat with Waraporn"
  >
    <header id="chatHeader">

      <div id="avatar">
        <img
          src="https://static.wixstatic.com/media/c090c7_a052ecc46c4543c986cb1cd85e856a99~mv2.jpg"
          alt="Waraporn"
        />

        <span id="avatarStatus" aria-hidden="true"></span>
      </div>

      <div id="headerText">
        <span id="headerEyebrow">Vanara Concierge</span>

        <h2 id="headerTitle">Waraporn</h2>

        <div id="headerStatus">
          <span class="status-dot" aria-hidden="true"></span>
          <span>Online now</span>
        </div>
      </div>

      <button
        id="closeButton"
        type="button"
        aria-label="Close chat"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 7l10 10"></path>
          <path d="M17 7 7 17"></path>
        </svg>
      </button>

    </header>

    <main
      id="messages"
      aria-live="polite"
      aria-label="Chat messages"
    ></main>

    <div id="typingIndicator">
      <span>Waraporn is typing</span>

      <span id="typingDots" aria-hidden="true">
        <span class="typingDot"></span>
        <span class="typingDot"></span>
        <span class="typingDot"></span>
      </span>
    </div>

    <footer id="composer">

      <textarea
        id="messageInput"
        rows="1"
        placeholder="Write your message…"
        aria-label="Chat message"
      ></textarea>

      <button
        id="sendButton"
        type="button"
        aria-label="Send message"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m4 4 16 8-16 8 3-8-3-8Z"></path>
          <path d="M7 12h13"></path>
        </svg>
      </button>

    </footer>
  </section>
